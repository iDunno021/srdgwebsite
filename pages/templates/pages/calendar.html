{% extends 'pages/base.html' %}
{% load static %}
{% block title %}Calendar | SRDG{% endblock %}
{% block head %}
<link rel="stylesheet" href="{% static 'pages/styles/calendar.css' %}">
{% endblock %}
{% block content %}
<div class="calendar-page">
    <div class="calendar-header">
        <h1>Calendar</h1>
        <div class="underline"></div>
        <p class="calendar-intro">
            Upcoming seminars, events, and initiatives — all in one place.
        </p>
    </div>
    <div class="calendar-embed-wrapper">
        <iframe
            src="https://calendar.google.com/calendar/embed?src=socialresearchanddiscourse%40gmail.com&ctz=Pacific%2FAuckland&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=1&showCalendars=0&showTz=1&mode=MONTH"
            class="calendar-embed"
            frameborder="0"
            scrolling="no"
            title="SRDG Calendar">
        </iframe>
    </div>
</div>
{% endblock %}
